services:
  # Backend Service
  - type: web
    name: heliomed-backend
    env: docker
    region: singapore # Optional, can invoke prompt to choose region
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: heliomed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: heliomed-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Service
  - type: web
    name: heliomed-frontend
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: heliomed-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_NEON_AUTH_URL
        sync: false

databases:
  - name: heliomed-db
    plan: free
    databaseName: heliomed
    user: heliomed_user

